name: CI — Tests & Quality Checks

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, develop ]

# Отменяет параллельный запуск для той же ветки
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Backend — unit tests всех модулей
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend — Unit Tests (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Запускаем ВСЕ unit-тесты (E2E профиль не включён)
      - name: Run unit tests
        run: mvn clean test --no-transfer-progress
        env:
          # Нужен для сервисов, использующих JWT в тестах (минимум 64 символа)
          JWT_SECRET: TestSecretKeyForCICD-MustBe64CharsOrMoreForHS512AlgorithmToWork!

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 2: Frontend — ESLint + TypeScript build
  # ──────────────────────────────────────────────
  frontend-checks:
    name: Frontend — ESLint & TypeScript Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint check
        working-directory: frontend
        run: npm run lint

      - name: TypeScript + Vite build
        working-directory: frontend
        run: npm run build
