name: CD — Build & Push Docker Images

on:
  push:
    branches: [ main ]
    tags:    [ 'v*.*.*' ]

# GITHUB_TOKEN нужен для записи в GHCR
permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Собираем все JAR-файлы одним mvn
  # ──────────────────────────────────────────────
  build-backend-jars:
    name: Build Backend JARs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all modules (skip tests)
        run: mvn clean package -DskipTests --no-transfer-progress

      # Сохраняем JARы со структурой backend/<service>/target/<jar>.jar
      - name: Upload JARs artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: backend/*/target/*.jar
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2: Docker build + push для каждого сервиса
  # (параллельная матрица — 7 сервисов одновременно)
  # ──────────────────────────────────────────────
  build-push-backend:
    name: Docker — ${{ matrix.service }}
    needs: build-backend-jars
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: backend/api-gateway
          - service: client-service
            context: backend/client-service
          - service: billing-service
            context: backend/billing-service
          - service: gate-control-service
            context: backend/gate-control-service
          - service: management-service
            context: backend/management-service
          - service: reporting-service
            context: backend/reporting-service
          - service: eureka-server
            context: backend/eureka-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Скачиваем в backend/ → восстанавливается backend/<service>/target/*.jar
      - name: Download built JARs
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: backend

      - name: Verify JAR exists
        run: |
          JAR=$(find backend/${{ matrix.service }}/target -name '*.jar' 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "::error::JAR not found for ${{ matrix.service }}"
            ls -la backend/${{ matrix.service }}/target/ || echo "(target dir missing)"
            exit 1
          fi
          echo "✅ Found JAR: $JAR"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Генерирует теги: latest (main), sha-XXXXXXX, v1.2.3 (для тегов)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/parking-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Кэш слоёв Docker через GitHub Actions Cache
          cache-from: type=gha,scope=backend-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.service }}

  # ──────────────────────────────────────────────
  # JOB 3: Docker build + push для Frontend
  # ──────────────────────────────────────────────
  build-push-frontend:
    name: Docker — frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/parking-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ──────────────────────────────────────────────
