# Test profile for client-service
# Uses H2 in-memory DB, no Flyway, no Eureka, no OTel

spring.flyway.enabled=false

# In-memory datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema from entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Eureka in tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable OpenTelemetry
spring.autoconfigure.exclude=io.opentelemetry.instrumentation.spring.autoconfigure.OpenTelemetryAutoConfiguration

# JWT (dummy value for tests)
security.jwt.secret=TestSecretKeyForUnitTestsOnlyNotForProduction1234567890

