spring:
  application:
    name: Gate Control Service
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/parking_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false  # Schema is managed by api-gateway Flyway migrations
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.parking.gate_control_service: DEBUG
    org.springframework.web: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html # Path to swagger UI
  api-docs:
    path: /v3/api-docs # Path to JSON documentation
  info:
    title: Gate Control Service API
    version: 1.0.0
    description: API for gate control and vehicle management

# Reporting / Audit trail
reporting:
  service:
    url: ${REPORTING_SERVICE_URL:http://reporting-service:8084}

# Inter-service communication URLs
services:
  client:
    url: ${CLIENT_SERVICE_URL:http://localhost:8081}
  billing:
    url: ${BILLING_SERVICE_URL:http://localhost:8082}
  management:
    url: ${MANAGEMENT_SERVICE_URL:http://localhost:8083}
  reporting:
    url: ${REPORTING_SERVICE_URL:http://localhost:8084}

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
